<div class="container mt-4">
  <div class="row g-4">

    @if (Tasks().length > 0) {

      @for (i of Tasks(); track i.id) {

        <div class="col-md-6">

          <div class="card border-0 shadow-sm rounded-4 h-100 hover-card">

            <div class="card-body p-4">

              <!-- Title -->
              <h5 class="fw-bold mb-2">
                <i class="bi bi-check2-square text-success me-2"></i>
                {{ i.Title }}
              </h5>

              <!-- Description -->
              <p class="text-muted mb-3">
                <i class="bi bi-align-left me-1"></i>
                {{ i.Description }}
              </p>

              <!-- Badges -->
              <div class="d-flex flex-wrap gap-2 mb-3">

                <span class="badge bg-light text-dark border">
                  <i class="bi bi-flag me-1 text-danger"></i>
                  {{ i.Priority }}
                </span>

                <span class="badge bg-light text-dark border">
                  <i class="bi bi-tag me-1 text-info"></i>
                  {{ i.Category }}
                </span>

                <span class="badge bg-success">
                  <i class="bi bi-check-circle me-1"></i>
                  {{ i.Status }}
                </span>

              </div>

              <!-- Footer -->
              <div class="d-flex justify-content-between align-items-center">

                <small class="text-muted">
                  <i class="bi bi-calendar-event me-1"></i>
                  {{ i.DueDate | date:'dd MMM yyyy' }}
                </small>

                <!-- Buttons -->
                <div class="d-flex gap-2">

                  <button (click)="onUpdateClick(i)"
                          class="btn btn-sm btn-outline-warning rounded-pill">
                    <i class="bi bi-pencil-square me-1"></i>
                    Update
                  </button>

                  <button (click)="onDeleteClick(i)"
                          class="btn btn-sm btn-outline-danger rounded-pill">
                    <i class="bi bi-trash me-1"></i>
                    Delete
                  </button>

                </div>

              </div>

            </div>
          </div>

        </div>

      }

    } @else {

      <div class="col-12">
        <div class="text-center py-5 empty-state">

          <div class="mb-3">
            <i class="bi bi-check2-circle display-4 text-success"></i>
          </div>

          <h4 class="text-muted">
            No Done Tasks Found
          </h4>

          <p class="text-muted mb-0">
            Complete some tasks to see them here 
          </p>

        </div>
      </div>

    }

  </div>
</div>
